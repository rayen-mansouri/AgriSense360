<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
const canvas=document.getElementById('C'),root=document.getElementById('R');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.18;
renderer.outputEncoding=THREE.sRGBEncoding;
renderer.setClearColor(0,0);

const scene=new THREE.Scene();
const cam=new THREE.PerspectiveCamera(40,1,.1,80);
cam.position.set(0,3.8,9.5);
cam.lookAt(0,2.6,0);

function resize(){
  const W=root.clientWidth,H=root.clientHeight;
  renderer.setSize(W,H,false);
  cam.aspect=W/H; cam.updateProjectionMatrix();
}
resize();
new ResizeObserver(resize).observe(root);

// ── LIGHTING ─────────────────────────────────────────────────────
scene.add(new THREE.HemisphereLight(0xb8d8f5,0x4a3a08,0.72));
const sun=new THREE.DirectionalLight(0xfff8e0,2.4);
sun.position.set(9,18,9); sun.castShadow=true;
sun.shadow.mapSize.width=sun.shadow.mapSize.height=1024;
sun.shadow.camera.near=.5; sun.shadow.camera.far=45;
sun.shadow.camera.left=-8; sun.shadow.camera.right=8;
sun.shadow.camera.top=12; sun.shadow.camera.bottom=-4;
sun.shadow.bias=-0.001;
scene.add(sun);
const fill=new THREE.DirectionalLight(0xc5e0ff,.52);
fill.position.set(-7,5,-5); scene.add(fill);
const back=new THREE.PointLight(0x80ff60,.38,20);
back.position.set(0,6,-7); scene.add(back);
const warm=new THREE.PointLight(0xffd080,.28,12);
warm.position.set(3,1,4); scene.add(warm);

// ── MATERIALS ────────────────────────────────────────────────────
function sm(col,rough=.7,metal=0,ex={}){
  return new THREE.MeshStandardMaterial({color:col,roughness:rough,metalness:metal,...ex});
}

// ── GROUND ───────────────────────────────────────────────────────
const gnd=new THREE.Mesh(new THREE.CylinderGeometry(4,4.4,.24,56),sm(0x3a2108,.95));
gnd.position.y=-.12; gnd.receiveShadow=true; scene.add(gnd);

const soilTop=new THREE.Mesh(new THREE.CylinderGeometry(3.9,3.9,.02,48),sm(0x4a2c0c,.9));
soilTop.position.y=.01; soilTop.receiveShadow=true; scene.add(soilTop);

const ringGeo=new THREE.TorusGeometry(.7,.07,8,32);
const ring=new THREE.Mesh(ringGeo,sm(0x3e2208,.88));
ring.rotation.x=Math.PI/2; ring.position.y=.02; scene.add(ring);

// pebbles
const pM=[sm(0x8a7050,.9),sm(0x7a6038,.88),sm(0x6a5028,.92),sm(0x9a8060,.85)];
for(let i=0;i<22;i++){
  const r=.5+Math.random()*3,a=Math.random()*Math.PI*2;
  const s=.04+Math.random()*.09;
  const g=new THREE.SphereGeometry(s,7,5);
  g.scale(1+Math.random()*.6,.3+Math.random()*.5,.8+Math.random()*.9);
  const p=new THREE.Mesh(g,pM[i%4]);
  p.position.set(Math.cos(a)*r,.01,Math.sin(a)*r);
  p.rotation.y=Math.random()*Math.PI*2;
  p.receiveShadow=true; scene.add(p);
}

// ── LEAF GEOMETRY (3D curved, V-cross-section, vertex-colored) ───
function leafGeo(len,maxW,droop,twist,cup){
  const LS=32,WS=14;
  const pos=[],col=[],uv=[],idx=[];
  const cMid=new THREE.Color(0x90d840);
  const cBlade=new THREE.Color(0x3e8c18);
  const cEdge=new THREE.Color(0x528a18);
  const cTip=new THREE.Color(0x7ab830);
  const cBase=new THREE.Color(0x2c6810);
  for(let i=0;i<=LS;i++){
    const t=i/LS;
    const wP=Math.pow(Math.sin(t*Math.PI*.94),.5)*(1-.18*t);
    const w=maxW*wP;
    const sagY=droop*t*t*len*.42;
    const sagZ=droop*t*len*.16;
    const bY=t*len-sagY;
    const ta=twist*t;
    for(let j=0;j<=WS;j++){
      const s=j/WS, sc=s*2-1;
      const vshape=cup*Math.abs(sc)*.8;
      const lx=sc*w, ly=vshape;
      const rx=lx*Math.cos(ta)-ly*Math.sin(ta);
      const ry=lx*Math.sin(ta)+ly*Math.cos(ta);
      pos.push(rx, bY+ry, sagZ+sc*w*.018);
      const cd=Math.abs(sc);
      let c;
      if(cd<.12){ c=cMid.clone().lerp(cBlade,cd/.12); }
      else if(cd>.82){ c=cBlade.clone().lerp(cEdge,(cd-.82)/.18); }
      else{ c=cBlade.clone(); }
      c.lerp(cTip,t*t*.38);
      c.lerp(cBase,(1-t)*(1-t)*.25);
      col.push(c.r,c.g,c.b);
      uv.push(s,t);
    }
  }
  for(let i=0;i<LS;i++){
    for(let j=0;j<WS;j++){
      const a=i*(WS+1)+j,b=a+1,c=(i+1)*(WS+1)+j,d=c+1;
      idx.push(a,c,b,b,c,d,b,c,a,d,c,b);
    }
  }
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
  g.setAttribute('color',new THREE.Float32BufferAttribute(col,3));
  g.setAttribute('uv',new THREE.Float32BufferAttribute(uv,2));
  g.setIndex(idx); g.computeVertexNormals();
  return g;
}
function mkLeaf(len,w,droop,twist,cup){
  const m=new THREE.Mesh(leafGeo(len,w,droop,twist,cup),
    new THREE.MeshStandardMaterial({vertexColors:true,side:THREE.DoubleSide,roughness:.5,metalness:0}));
  m.castShadow=true; return m;
}

// ── STEM (catmull-rom curve → segmented cylinders + node bulges) ─
function mkStem(H,lx,lz,r0,r1){
  const pts=[
    new THREE.Vector3(0,0,0),
    new THREE.Vector3(lx*.12,H*.18,lz*.12),
    new THREE.Vector3(lx*.32,H*.38,lz*.3),
    new THREE.Vector3(lx*.55,H*.58,lz*.5),
    new THREE.Vector3(lx*.76,H*.76,lz*.7),
    new THREE.Vector3(lx*.9,H*.88,lz*.86),
    new THREE.Vector3(lx,H,lz),
  ];
  const curve=new THREE.CatmullRomCurve3(pts);
  const grp=new THREE.Group();
  const N=7, ps=curve.getPoints(N);
  const sM=sm(0x3c7c1c,.60), nM=sm(0x2a6010,.68);
  for(let i=0;i<N;i++){
    const t=i/(N-1);
    const rad=r0*(1-t)+r1*t;
    const p1=ps[i],p2=ps[i+1];
    const dir=new THREE.Vector3().subVectors(p2,p1);
    const ln=dir.length();
    const mid=new THREE.Vector3().addVectors(p1,p2).multiplyScalar(.5);
    const cyl=new THREE.Mesh(new THREE.CylinderGeometry(rad*.86,rad,ln*1.06,10),sM);
    cyl.position.copy(mid);
    const up=new THREE.Vector3(0,1,0),dn=dir.clone().normalize();
    const ax=new THREE.Vector3().crossVectors(up,dn);
    if(ax.lengthSq()>1e-6) cyl.setRotationFromAxisAngle(ax.normalize(),Math.acos(Math.max(-1,Math.min(1,up.dot(dn)))));
    cyl.castShadow=true; grp.add(cyl);
    if(i>0){
      const nd=new THREE.Mesh(new THREE.SphereGeometry(rad*1.22,9,7),nM);
      nd.scale.y=.52; nd.position.copy(ps[i]); nd.castShadow=true; grp.add(nd);
    }
  }
  // fine hair-like surface veins on stem
  const veinM=sm(0x2a6012,.72);
  for(let v=0;v<4;v++){
    const vA=v/4*Math.PI*2;
    const vPts=ps.map(p=>new THREE.Vector3(
      p.x+Math.cos(vA)*.04, p.y, p.z+Math.sin(vA)*.04
    ));
    const vCurve=new THREE.CatmullRomCurve3(vPts);
    const vGeo=new THREE.TubeGeometry(vCurve,20,.006,3,false);
    const vMesh=new THREE.Mesh(vGeo,veinM);
    vMesh.castShadow=false; grp.add(vMesh);
  }
  return {grp,curve};
}

// ── WHEAT EAR (rachis + spikelets + awns) ────────────────────────
function mkEar(){
  const g=new THREE.Group();
  const rLen=1.0;
  const rPts=[
    new THREE.Vector3(0,0,0),
    new THREE.Vector3(.01,rLen*.2,0),
    new THREE.Vector3(.03,rLen*.48,.012),
    new THREE.Vector3(.07,rLen*.74,.05),
    new THREE.Vector3(.14,rLen,.13),
  ];
  const rC=new THREE.CatmullRomCurve3(rPts);
  g.add(new THREE.Mesh(
    new THREE.TubeGeometry(rC,24,.014,8,false),
    sm(0xaa8818,.58)
  ));

  const grM=sm(0xd0ac20,.46,.07,{emissive:0x201000,emissiveIntensity:.2});
  const glM=sm(0xa08012,.64);
  const awnM=sm(0xb87a08,.52);

  for(let i=0;i<16;i++){
    const t=i/15, side=(i%2===0)?1:-1;
    const rp=rC.getPoint(t*.88+.04);
    const sp=new THREE.Group();
    sp.position.copy(rp);
    sp.rotation.z=side*.54;
    sp.rotation.x=.2+t*.08;

    // outer glume
    const gG=new THREE.SphereGeometry(1,9,9);
    gG.scale(.05,.135,.036);
    const gl=new THREE.Mesh(gG,glM);
    gl.position.x=side*.05; gl.rotation.z=side*.28;
    sp.add(gl);

    // 3 grain bodies per spikelet
    for(let k=0;k<3;k++){
      const grG=new THREE.SphereGeometry(1,8,8);
      grG.scale(.038,.09,.032);
      const gr=new THREE.Mesh(grG,grM);
      gr.position.set(side*(.062+k*.013),k*.058,.008+k*.004);
      gr.rotation.z=side*(.3+k*.05);
      gr.castShadow=true; sp.add(gr);
      // awn
      const aL=.28+Math.random()*.15;
      const aP=[
        new THREE.Vector3(0,0,0),
        new THREE.Vector3(side*.009,aL*.38,.004),
        new THREE.Vector3(side*.02,aL*.72,.011),
        new THREE.Vector3(side*.03,aL,.019),
      ];
      const aw=new THREE.Mesh(
        new THREE.TubeGeometry(new THREE.CatmullRomCurve3(aP),9,.0032,3,false),awnM
      );
      aw.position.set(side*.062,k*.058+.09,.008);
      sp.add(aw);
    }
    g.add(sp);
  }
  return g;
}

// ── PLANT ASSEMBLY ───────────────────────────────────────────────
const plantRoot=new THREE.Group(); scene.add(plantRoot);

function buildPlant(x,z,hs,lx,lz,ph){
  const pg=new THREE.Group();
  pg.position.set(x,.18,z);
  const H=3.9*hs;
  const {grp:sg,curve}=mkStem(H,lx,lz,.046,.019);
  pg.add(sg);

  // leaves - golden angle phyllotaxis
  const TP=[.13,.26,.40,.54,.67,.80];
  const SZ=[1.4,1.62,1.52,1.3,1.1,.84];
  const leafGrps=[];

  TP.forEach((tp,li)=>{
    const lA=ph+li*2.399; // golden angle ≈137.5°
    const lp=curve.getPoint(tp);
    const lt=curve.getTangent(tp).normalize();
    const lLen=SZ[li]*(.52+hs*.48);
    const lW=lLen*(.094+Math.random()*.018);
    const lD=.28+Math.random()*.28;
    const lT=.08+Math.random()*.14;
    const leaf=mkLeaf(lLen,lW,lD,lT,.034);

    // leaf sheath (cylindrical wrap around stem)
    const sheathH=lLen*.2;
    const sheath=new THREE.Mesh(
      new THREE.CylinderGeometry(.056,.05,sheathH,10,1,true),
      sm(0x2c680e,.72)
    );
    sheath.position.y=sheathH*.5; sheath.castShadow=true;

    // ligule (tiny membrane at collar)
    const ligule=new THREE.Mesh(
      new THREE.TorusGeometry(.055,.006,5,12,Math.PI),
      sm(0x3a7818,.65)
    );
    ligule.rotation.x=Math.PI/2; ligule.position.y=sheathH;

    const lg=new THREE.Group();
    lg.add(sheath); lg.add(ligule);
    const blade=new THREE.Group();
    blade.add(leaf);
    blade.position.y=sheathH; blade.rotation.z=.08;
    lg.add(blade);

    lg.position.copy(lp); lg.rotation.y=lA;
    const up=new THREE.Vector3(0,1,0);
    const ax=new THREE.Vector3().crossVectors(up,lt);
    if(ax.lengthSq()>1e-5)
      lg.rotateOnWorldAxis(ax.normalize(),Math.acos(Math.max(-1,Math.min(1,up.dot(lt))))*0.44);
    lg.scale.setScalar(0);
    lg.userData={bA:lA,ph:Math.random()*Math.PI*2};
    pg.add(lg); leafGrps.push(lg);
  });

  // flag leaf
  const fl=mkLeaf(.95,.112,.6,.22,.038);
  const flg=new THREE.Group(); flg.add(fl);
  flg.position.copy(curve.getPoint(.9));
  flg.rotation.y=ph+.85;
  flg.scale.setScalar(0);
  flg.userData={bA:ph+.85,ph:.4};
  pg.add(flg); leafGrps.push(flg);

  // peduncle (internode below ear, slightly different color)
  const pedPts=[curve.getPoint(.9),curve.getPoint(.96),curve.getPoint(1)];
  const pedCurve=new THREE.CatmullRomCurve3(pedPts);
  const pedMesh=new THREE.Mesh(
    new THREE.TubeGeometry(pedCurve,8,.016,7,false),
    sm(0x5a9820,.55)
  );
  pedMesh.castShadow=true; pg.add(pedMesh);

  const ear=mkEar();
  ear.position.copy(curve.getPoint(1));
  ear.rotation.y=ph;
  ear.scale.setScalar(0);
  pg.add(ear);

  pg.scale.setScalar(0); plantRoot.add(pg);
  return{pg,leafGrps,ear};
}

const PLTS=[
  {x:0,z:0,hs:1,lx:.05,lz:.02,ph:0},
  {x:-.57,z:.22,hs:.89,lx:-.04,lz:.06,ph:1.22},
  {x:.61,z:.17,hs:.92,lx:.06,lz:-.04,ph:2.44},
  {x:-.31,z:-.51,hs:.83,lx:-.03,lz:-.05,ph:3.66},
  {x:.37,z:-.47,hs:.86,lx:.04,lz:-.03,ph:4.88},
];
const plants=PLTS.map(d=>buildPlant(d.x,d.z,d.hs,d.lx,d.lz,d.ph));

// ── GRASS BLADES ─────────────────────────────────────────────────
const grassBlades=[];
const gC=[0x3a7818,0x4a8820,0x2e6610,0x528e20,0x3e7014,0x44801a];
for(let i=0;i<80;i++){
  const r=.5+Math.random()*3,a=Math.random()*Math.PI*2;
  const h=.16+Math.random()*.52, lean=(Math.random()-.5)*.2;
  const gPts=[
    new THREE.Vector3(0,0,0),
    new THREE.Vector3(lean*.4,h*.45,.002),
    new THREE.Vector3(lean,h,0),
  ];
  const blade=new THREE.Mesh(
    new THREE.TubeGeometry(new THREE.CatmullRomCurve3(gPts),6,.01+Math.random()*.01,3,false),
    sm(gC[i%6],.78)
  );
  blade.position.set(Math.cos(a)*r,.18,Math.sin(a)*r);
  blade.rotation.y=Math.random()*Math.PI*2;
  blade.scale.setScalar(0);
  blade.userData={ph:Math.random()*Math.PI*2,ws:.35+Math.random()*.65};
  scene.add(blade); grassBlades.push(blade);
}

// ── POLLEN PARTICLES ────────────────────────────────────────────
const particles=[];
const pC=[0x5a9814,0xd4a520,0x1596d6,0x7fbb2e,0x44b6e6,0xffec80];
for(let i=0;i<36;i++){
  const m=new THREE.Mesh(
    new THREE.SphereGeometry(.012+Math.random()*.018,5,5),
    sm(pC[i%6],.45)
  );
  const r=.9+Math.random()*3,a=Math.random()*Math.PI*2;
  m.position.set(Math.cos(a)*r,.4+Math.random()*3.8,Math.sin(a)*r);
  m.userData={by:m.position.y,ph:Math.random()*Math.PI*2,sp:.3+Math.random()*.5};
  m.scale.setScalar(0); scene.add(m); particles.push(m);
}

// ── UI ───────────────────────────────────────────────────────────
const sp=document.getElementById('SP');
const pf=document.getElementById('PF');
const ht=document.getElementById('HT');
const stg=document.getElementById('STG');
const bdg=document.getElementById('bdg');
const hl=document.getElementById('hl');
const mcA=document.getElementById('mcA');
const mcB=document.getElementById('mcB');
const bfA=document.getElementById('bfA');
const bfB=document.getElementById('bfB');

let P=0; const shown={};
sp.addEventListener('scroll',()=>{
  const mx=sp.scrollHeight-sp.clientHeight;
  P=Math.min(sp.scrollTop/mx,1);
  pf.style.width=P*100+'%';
  if(P>.05) ht.style.opacity='0';
  const s=['sprouting...','growing stem...','leaves unfurling...','grain heading...','fully grown!'];
  stg.textContent=s[Math.min(Math.floor(P*5),4)];
  stg.style.opacity=P>.02?'1':'0';
  if(P>.07&&!shown.b){bdg.style.opacity='1';shown.b=1;}
  if(P>.18&&!shown.h){hl.style.opacity='1';hl.style.transform='translateY(0)';shown.h=1;}
  if(P>.42&&!shown.a){mcA.style.opacity='1';mcA.style.transform='translateY(0)';setTimeout(()=>bfA.style.width='98%',120);shown.a=1;}
  if(P>.68&&!shown.b2){mcB.style.opacity='1';mcB.style.transform='translateY(0)';setTimeout(()=>bfB.style.width='92%',120);shown.b2=1;}
});

function eO(t){return 1-(1-t)**3;}
function cl(t){return Math.max(0,Math.min(1,t));}
function band(p,a,b){return eO(cl((p-a)/(b-a)));}
function lerp(a,b,t){return a+(b-a)*t;}

const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const t=clock.getElapsedTime();
  const wx=Math.sin(t*.65)*.016+Math.sin(t*1.35)*.009;
  const wz=Math.cos(t*.82)*.012;

  grassBlades.forEach(b=>{
    b.scale.setScalar(band(P,0,.14));
    b.rotation.x=Math.sin(t*b.userData.ws+b.userData.ph)*.13+wx;
    b.rotation.z=Math.cos(t*b.userData.ws*.7+b.userData.ph)*.06+wz*.5;
  });

  plants.forEach((pl,pi)=>{
    const d=pi*.055;
    pl.pg.scale.setScalar(band(P,.04+d,.36+d));
    pl.leafGrps.forEach((lg,li)=>{
      lg.scale.setScalar(band(P,.25+d+li*.038,.46+d+li*.038));
      lg.rotation.z=Math.sin(t*.72+lg.userData.ph)*.038+wx*1.5;
      lg.rotation.x=Math.sin(t*.55+lg.userData.ph+1)*.015;
    });
    pl.ear.scale.setScalar(band(P,.72,.92));
    pl.ear.rotation.x=Math.sin(t*.42+pi)*.03+wx*.45;
    pl.ear.rotation.z=Math.cos(t*.38+pi)*.02+wz*.3;
  });

  particles.forEach(p2=>{
    p2.scale.setScalar(band(P,.44,.7)*2.2);
    p2.position.y=p2.userData.by+Math.sin(t*p2.userData.sp+p2.userData.ph)*.24;
    p2.rotation.y+=.008;
  });

  plantRoot.rotation.y=P*Math.PI*2.5+Math.sin(t*.18)*.028;
  cam.position.y=lerp(3.8,5.5,eO(P));
  cam.position.z=lerp(9.5,6,eO(cl(P*1.6)));
  cam.lookAt(0,lerp(2.6,3.8,P),0);

  renderer.render(scene,cam);
}
animate();
})();
</script>
