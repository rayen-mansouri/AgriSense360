security:
    password_hashers:
        App\Entity\User:
            algorithm: auto

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    role_hierarchy:
        ROLE_ADMIN:   [ROLE_OWNER, ROLE_GERANT, ROLE_OUVRIER, ROLE_USER]
        ROLE_OWNER:   [ROLE_USER]
        ROLE_GERANT:  [ROLE_USER]
        ROLE_OUVRIER: [ROLE_USER]

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        main:
            lazy: true
            provider: app_user_provider
            user_checker: App\Security\UserChecker
            form_login:
                login_path: app_login
                check_path: app_login
                default_target_path: app_home
                username_parameter: email
                password_parameter: password
                enable_csrf: true
            logout:
                path: app_logout
                target: app_index
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 900
                always_remember_me: false

    access_control:
        - { path: ^/login,               roles: PUBLIC_ACCESS }
        - { path: ^/register,            roles: PUBLIC_ACCESS }
        - { path: ^/connect,             roles: PUBLIC_ACCESS }
        - { path: ^/connect/google,          roles: PUBLIC_ACCESS }
        - { path: ^/connect/google/check,    roles: PUBLIC_ACCESS }
        - { path: ^/connect/google/complete, roles: PUBLIC_ACCESS }
        # Password reset — all 3 steps must be public
        - { path: ^/forgot-password,     roles: PUBLIC_ACCESS }
        - { path: ^/verify-code,         roles: PUBLIC_ACCESS }
        - { path: ^/reset-password,      roles: PUBLIC_ACCESS }
        # Farm routes — owners only
        - { path: ^/farm,                roles: ROLE_OWNER }

        - { path: ^/$,                   roles: PUBLIC_ACCESS }
        - { path: ^/home,                roles: PUBLIC_ACCESS }
        - { path: ^/admin,               roles: ROLE_ADMIN }
        - { path: ^/pending,             roles: PUBLIC_ACCESS }
        # Worker farm browser — accessible to pending workers too (they only have ROLE_USER)
        - { path: ^/ouvrier/farms,       roles: ROLE_USER }
        - { path: ^/ouvrier/apply,       roles: ROLE_USER }
        - { path: ^/ouvrier/withdraw,    roles: ROLE_USER }
        - { path: ^/,                    roles: ROLE_USER }