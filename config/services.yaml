parameters:
    photos_directory: '%kernel.project_dir%/public/uploads/photos'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true
        autoconfigure: true

    # makes classes in src/ available to be used as services
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # ── Bind Google OAuth credentials to GoogleAuthController ──────────────
    App\Controller\user\GoogleAuthController:
        arguments:
            $googleClientId:     '%env(GOOGLE_CLIENT_ID)%'
            $googleClientSecret: '%env(GOOGLE_CLIENT_SECRET)%'

    # ── Bind MailService parameters ──────────────────────────────────────
    App\Service\MailService:
        arguments:
            $fromEmail: '%env(MAIL_FROM)%'
            $toEmail: '%env(MAIL_TO)%'

    # ── Bind WeatherService parameters ──────────────────────────────────
    App\Service\WeatherService:
        arguments:
            $apiKey: '%env(OPENWEATHER_API_KEY)%'
