<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Carte Tunisie — Parcelles</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <style>
        /* ── RESET ── */
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI',Tahoma,Geneva,sans-serif;background:#f0f4f0}

        /* ── LAYOUT ── */
        #app{display:flex;height:100vh;width:100vw}

        /* ── SIDEBAR ── */
        #sidebar{
            width:300px;min-width:300px;
            background:#fff;
            border-right:3px solid #2e7d32;
            display:flex;flex-direction:column;
            overflow:hidden;z-index:1000;
            box-shadow:4px 0 24px rgba(0,0,0,.15);
        }

        /* Header */
        #sidebar-header{
            background:linear-gradient(135deg,#1b5e20,#2e7d32);
            padding:16px 16px 14px;
            flex-shrink:0;
        }
        #sidebar-header h2{font-size:13px;font-weight:700;color:#fff;letter-spacing:.8px;text-transform:uppercase}
        #sidebar-header p{font-size:11px;color:#c8e6c9;margin-top:3px}

        /* Gov info bar */
        #gov-info{
            padding:12px 16px;border-bottom:2px solid #e8f5e9;
            min-height:62px;display:flex;align-items:center;
            background:#f9fffe;flex-shrink:0;
        }
        #gov-info.empty{color:#9e9e9e;font-size:12px;font-style:italic}
        #gov-info.empty::before{content:'👆 ';font-style:normal}
        .gov-name{font-size:17px;font-weight:700;color:#1b5e20;line-height:1.2}
        .gov-sub{font-size:11px;color:#4caf50;margin-top:3px;font-weight:600}

        /* Parcelle list */
        #parcelles-section{flex:1;overflow-y:auto;padding:10px}
        #parcelles-section::-webkit-scrollbar{width:5px}
        #parcelles-section::-webkit-scrollbar-track{background:#f5f5f5}
        #parcelles-section::-webkit-scrollbar-thumb{background:#a5d6a7;border-radius:3px}
        #parcelles-list{display:flex;flex-direction:column;gap:8px}

        /* Cards */
        .p-card{
            background:#fff;border-radius:10px;padding:12px 13px;
            border-left:4px solid #4CAF50;
            box-shadow:0 2px 8px rgba(0,0,0,.08);
            transition:all .15s ease;cursor:default;
            position:relative;
        }
        .p-card.occupee{border-left-color:#ef5350}
        .p-card.target{
            border-left-color:#ff9800!important;
            box-shadow:0 3px 16px rgba(255,152,0,.25)!important;
            background:#fffde7!important;
        }
        .p-card:hover{transform:translateX(3px);box-shadow:0 4px 14px rgba(0,0,0,.14)}

        /* Dot indicator on card */
        .p-card .dot-ind{
            width:10px;height:10px;border-radius:50%;
            display:inline-block;margin-right:6px;flex-shrink:0;
            vertical-align:middle;
        }
        .p-card .dot-ind.libre{background:#4CAF50;box-shadow:0 0 4px rgba(76,175,80,.6)}
        .p-card .dot-ind.occupee-dot{background:#ef5350;box-shadow:0 0 4px rgba(239,83,80,.6)}

        .card-name{font-size:13px;font-weight:700;color:#1a1a1a;display:flex;align-items:center}
        .card-row{display:flex;justify-content:space-between;font-size:11px;color:#616161;margin-top:4px}
        .card-row .val{color:#333;font-weight:600}
        .badge{
            display:inline-block;font-size:10px;font-weight:700;
            padding:2px 9px;border-radius:10px;margin-top:7px;
        }
        .badge.libre{background:#e8f5e9;color:#2e7d32;border:1px solid #81c784}
        .badge.occupee{background:#ffebee;color:#c62828;border:1px solid #ef9a9a}

        .no-parcelles{
            text-align:center;color:#bdbdbd;font-size:12px;
            padding:32px 10px;font-style:italic;
        }
        .no-parcelles .icon{font-size:32px;display:block;margin-bottom:10px}

        /* Stats bar */
        #stats-bar{
            background:#f1f8e9;border-top:2px solid #c8e6c9;
            padding:10px 16px;display:flex;justify-content:space-around;
            font-size:11px;color:#555;flex-shrink:0;
        }
        .stat-item{text-align:center}
        .stat-num{font-size:16px;font-weight:700;color:#2e7d32;display:block}
        .stat-num.rouge{color:#c62828}

        /* ── MAP ── */
        #map{flex:1;height:100vh;background:#e8f0e8}

        /* Leaflet overrides — white clean background */
        .leaflet-container{background:#e8eeea!important}

        /* Gov label tooltip */
        .gov-label{
            background:rgba(255,255,255,.92)!important;
            border:1.5px solid #2e7d32!important;
            border-radius:6px!important;
            color:#1b5e20!important;
            font-size:11px!important;font-weight:700!important;
            padding:4px 9px!important;
            box-shadow:0 2px 10px rgba(0,0,0,.18)!important;
            white-space:nowrap;
        }
        .gov-label::before{display:none!important}

        /* Legend */
        .map-legend{
            background:rgba(255,255,255,.95);
            border:1.5px solid #2e7d32;border-radius:10px;
            padding:10px 14px;font-size:11px;color:#444;
            box-shadow:0 3px 12px rgba(0,0,0,.15);
            min-width:150px;
        }
        .map-legend h4{color:#1b5e20;font-size:11px;font-weight:700;margin-bottom:8px;text-transform:uppercase;letter-spacing:.7px}
        .legend-item{display:flex;align-items:center;gap:8px;margin-top:5px}
        .legend-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
        .legend-sq{width:14px;height:10px;border-radius:2px;flex-shrink:0}

        /* Loading */
        #loading{
            position:fixed;top:0;left:0;right:0;bottom:0;
            background:#f0f4f0;
            display:flex;flex-direction:column;align-items:center;justify-content:center;
            z-index:9999;transition:opacity .4s;
        }
        #loading h3{color:#2e7d32;margin-top:14px;font-size:14px;font-weight:700}
        #loading p{color:#888;font-size:11px;margin-top:5px}
        .spinner{width:40px;height:40px;border:4px solid #c8e6c9;border-top-color:#2e7d32;border-radius:50%;animation:spin .8s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
    </style>
</head>
<body>

<div id="loading">
    <div class="spinner"></div>
    <h3>Chargement de la carte…</h3>
    <p>24 Gouvernorats de Tunisie</p>
</div>

<div id="app">
    <!-- SIDEBAR -->
    <div id="sidebar">
        <div id="sidebar-header">
            <h2>🌍 Parcelles par Gouvernorat</h2>
            <p>Cliquez sur un gouvernorat pour voir ses parcelles</p>
        </div>

        <div id="gov-info" class="empty">
            Cliquez sur un gouvernorat
        </div>

        <div id="parcelles-section">
            <div id="parcelles-list">
                <div class="no-parcelles">
                    <span class="icon">🗺️</span>
                    Sélectionnez un gouvernorat sur la carte
                </div>
            </div>
        </div>

        <div id="stats-bar">
            <div class="stat-item">
                <span class="stat-num" id="stat-total">0</span>Total
            </div>
            <div class="stat-item">
                <span class="stat-num" id="stat-libres">0</span>Libres
            </div>
            <div class="stat-item">
                <span class="stat-num rouge" id="stat-occupees">0</span>Occupées
            </div>
        </div>
    </div>

    <!-- MAP -->
    <div id="map"></div>
</div>

    // ══════════════════════════════════════════════════════════
    //  STATE
    // ══════════════════════════════════════════════════════════
    var allParcelles   = [];
    var selectedGov    = null;   // currently CLICKED (locked) governorate
    var hoveredLayer   = null;   // layer currently hovered
    var selectedLayer  = null;   // layer currently selected/locked
    var geojsonLayer   = null;
    var dotMarkers     = [];      // circle markers for parcelles
    var focusParcelle  = null;

    // ── Called by Java after page load ──────────────────────
    function setParcelles(jsonStr) {
        try { allParcelles = JSON.parse(jsonStr); } catch(e) { allParcelles = []; }
        updateStats();
        if (geojsonLayer) {
            refreshStyles();
            redrawDots();
        }
        if (selectedGov) showParcelles(selectedGov);
    }

    // ── Called by Java to focus a specific parcelle ─────────
    function focusOnParcelle(govName, parcelleName) {
        focusParcelle = parcelleName;
        selectGovernorate(govName);
    }

    // ══════════════════════════════════════════════════════════
    //  STATS
    // ══════════════════════════════════════════════════════════
    function updateStats() {
        var total    = allParcelles.length;
        var libres   = allParcelles.filter(function(p){ return isLibre(p); }).length;
        var occupees = total - libres;
        document.getElementById('stat-total').textContent    = total;
        document.getElementById('stat-libres').textContent   = libres;
        document.getElementById('stat-occupees').textContent = occupees;
    }

    function isLibre(p) {
        return p.statut && p.statut.toLowerCase().includes('libre');
    }

    // ══════════════════════════════════════════════════════════
    //  GOV → PARCELLES MATCHING
    // ══════════════════════════════════════════════════════════
    var GOV_ALIASES = {
        "Gabès":       ["gabès","gabes"],
        "Siliana":     ["siliana"],
        "Le Kef":      ["le kef","kef"],
        "Kasserine":   ["kasserine","kassérine"],
        "Jendouba":    ["jendouba"],
        "Kairouan":    ["kairouan"],
        "Béja":        ["béja","beja"],
        "Ben Arous":   ["ben arous","ben-arous","benarous"],
        "Ariana":      ["ariana"],
        "Sousse":      ["sousse"],
        "Tunis":       ["tunis"],
        "Bizerte":     ["bizerte"],
        "Sidi Bouzid": ["sidi bouzid","sidi-bouzid","sidi bou zid"],
        "Zaghouan":    ["zaghouan"],
        "Nabeul":      ["nabeul"],
        "Manouba":     ["manouba"],
        "Sfax":        ["sfax"],
        "Mahdia":      ["mahdia"],
        "Monastir":    ["monastir"],
        "Kébili":      ["kébili","kebili"],
        "Tozeur":      ["tozeur"],
        "Gafsa":       ["gafsa"],
        "Tataouine":   ["tataouine"],
        "Médenine":    ["médenine","medenine"]
    };

    function getParcelles(govName) {
        var aliases = GOV_ALIASES[govName] || [govName.toLowerCase()];
        return allParcelles.filter(function(p) {
            if (!p.localisation) return false;
            var loc = p.localisation.toLowerCase();
            return aliases.some(function(a){ return loc === a || loc.includes(a); });
        });
    }

    // ══════════════════════════════════════════════════════════
    //  SIDEBAR — show parcelles for a gov
    // ══════════════════════════════════════════════════════════
    function showParcelles(govName) {
        var parcelles = getParcelles(govName);
        var count     = parcelles.length;

        // Gov info bar
        var govInfo = document.getElementById('gov-info');
        govInfo.classList.remove('empty');
        govInfo.innerHTML =
            '<div>' +
            '<div class="gov-name">📍 ' + govName + '</div>' +
            '<div class="gov-sub">' + count + ' parcelle' + (count!==1?'s':'') + ' enregistrée' + (count!==1?'s':'') + '</div>' +
            '</div>';

        var list = document.getElementById('parcelles-list');

        if (count === 0) {
            list.innerHTML = '<div class="no-parcelles"><span class="icon">🌿</span>Aucune parcelle dans ce gouvernorat</div>';
            focusParcelle = null;
            return;
        }

        list.innerHTML = parcelles.map(function(p, i) {
            var libre      = isLibre(p);
            var cardCls    = libre ? '' : ' occupee';
            var dotCls     = libre ? 'libre' : 'occupee-dot';
            var badgeCls   = libre ? 'libre' : 'occupee';
            var isTarget   = focusParcelle && p.nom === focusParcelle;
            var targetCls  = isTarget ? ' target' : '';
            return (
                '<div class="p-card' + cardCls + targetCls + '" id="pcard-' + i + '">' +
                '<div class="card-name">' +
                '<span class="dot-ind ' + dotCls + '"></span>' +
                (p.nom || 'Sans nom') +
                '</div>' +
                '<div class="card-row"><span>📏 Surface</span><span class="val">' + (p.surface||'—') + ' m²</span></div>' +
                (p.typeSol ? '<div class="card-row"><span>🏔 Sol</span><span class="val">' + p.typeSol + '</span></div>' : '') +
                '<span class="badge ' + badgeCls + '">' + (p.statut||'—') + '</span>' +
                '</div>'
            );
        }).join('');

        // Scroll to target parcelle
        if (focusParcelle) {
            setTimeout(function() {
                parcelles.forEach(function(p, i) {
                    if (p.nom === focusParcelle) {
                        var el = document.getElementById('pcard-' + i);
                        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                });
                focusParcelle = null;
            }, 200);
        }
    }

    // ══════════════════════════════════════════════════════════
    //  MAP SETUP
    // ══════════════════════════════════════════════════════════
    var map = L.map('map', {
        zoomControl: true,
        attributionControl: true,
        // NO tile layer — clean white/green background
    }).setView([33.8, 9.5], 6);

    // Light, minimal tile layer — very clean
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
        subdomains: 'abcd',
        maxZoom: 18,
        attribution: '© CartoDB · OSM'
    }).addTo(map);

    // ══════════════════════════════════════════════════════════
    //  GOV POLYGON STYLES
    // ══════════════════════════════════════════════════════════
    function countParcelles(govName) {
        return getParcelles(govName).length;
    }

    function baseStyle(feature) {
        var n = countParcelles(feature.properties.name);
        return {
            fillColor:   n > 0 ? '#c8e6c9' : '#f1f8f1',
            weight:      1.5,
            opacity:     1,
            color:       '#4CAF50',
            dashArray:   n > 0 ? '' : '6,4',
            fillOpacity: n > 0 ? 0.7 : 0.35,
        };
    }

    function hoverStyle(feature) {
        var n = countParcelles(feature.properties.name);
        return {
            fillColor:   n > 0 ? '#81c784' : '#c8e6c9',
            weight:      2.5,
            color:       '#1b5e20',
            fillOpacity: 0.85,
        };
    }

    function selectedStyle(feature) {
        return {
            fillColor:   '#4CAF50',
            weight:      3,
            color:       '#1b5e20',
            fillOpacity: 0.88,
            dashArray:   '',
        };
    }

    function refreshStyles() {
        if (!geojsonLayer) return;
        geojsonLayer.eachLayer(function(layer) {
            if (layer === selectedLayer) {
                layer.setStyle(selectedStyle(layer.feature));
            } else {
                layer.setStyle(baseStyle(layer.feature));
            }
            // refresh tooltip
            var govName = layer.feature.properties.name;
            var count   = countParcelles(govName);
            layer.unbindTooltip();
            layer.bindTooltip(
                '<b>' + govName + '</b>' + (count > 0 ? '<br>🌾 ' + count + ' parcelle' + (count!==1?'s':'') : '<br><i>Aucune parcelle</i>'),
                { className: 'gov-label', sticky: true, offset: [10, 0] }
            );
        });
    }

    // ══════════════════════════════════════════════════════════
    //  SELECT GOVERNORATE (click-lock)
    // ══════════════════════════════════════════════════════════
    function selectGovernorate(govName) {
        selectedGov = govName;

        // Reset all styles first
        geojsonLayer.eachLayer(function(layer) {
            layer.setStyle(baseStyle(layer.feature));
        });

        // Find and apply selected style
        geojsonLayer.eachLayer(function(layer) {
            if (layer.feature.properties.name === govName) {
                selectedLayer = layer;
                layer.setStyle(selectedStyle(layer.feature));
                layer.bringToFront();
                // Focus map on this gov
                map.fitBounds(layer.getBounds(), { padding: [60, 60], maxZoom: 10, animate: true });
            }
        });

        showParcelles(govName);
    }

    // ══════════════════════════════════════════════════════════
    //  GEOJSON LAYER
    // ══════════════════════════════════════════════════════════
    function onEachFeature(feature, layer) {
        var govName = feature.properties.name;
        var count   = countParcelles(govName);

        // Tooltip
        layer.bindTooltip(
            '<b>' + govName + '</b>' + (count > 0 ? '<br>🌾 ' + count + ' parcelle' + (count!==1?'s':'') : '<br><i>Aucune parcelle</i>'),
            { className: 'gov-label', sticky: true, offset: [10, 0] }
        );

        layer.on({
            mouseover: function(e) {
                hoveredLayer = e.target;
                // Only change style if not the selected one
                if (e.target !== selectedLayer) {
                    e.target.setStyle(hoverStyle(feature));
                    e.target.bringToFront();
                }
            },
            mouseout: function(e) {
                hoveredLayer = null;
                if (e.target !== selectedLayer) {
                    e.target.setStyle(baseStyle(feature));
                }
            },
            click: function(e) {
                L.DomEvent.stopPropagation(e);
                selectGovernorate(govName);
            }
        });
    }

    // ══════════════════════════════════════════════════════════
    //  DOTS — one circle marker per parcelle on the map
    //  Green = Libre, Red = Occupée
    //  Placed slightly spread around the centroid
    // ══════════════════════════════════════════════════════════
    var dotLayerGroup = L.layerGroup().addTo(map);

    function redrawDots() {
        dotLayerGroup.clearLayers();
        dotMarkers = [];

        // Group parcelles by gov
        var govGroups = {};
        allParcelles.forEach(function(p) {
            // Find which gov this parcelle belongs to
            var govName = null;
            for (var gn in GOV_ALIASES) {
                var aliases = GOV_ALIASES[gn];
                if (p.localisation) {
                    var loc = p.localisation.toLowerCase();
                    if (aliases.some(function(a){ return loc === a || loc.includes(a); })) {
                        govName = gn;
                        break;
                    }
                }
            }
            if (!govName) return;
            if (!govGroups[govName]) govGroups[govName] = [];
            govGroups[govName].push(p);
        });

        // For each gov, place dots around centroid
        TUNISIA_GEOJSON.features.forEach(function(feat) {
            var govName = feat.properties.name;
            var parcelles = govGroups[govName] || [];
            if (parcelles.length === 0) return;

            var cx = feat.properties.cx;  // lng
            var cy = feat.properties.cy;  // lat

            parcelles.forEach(function(p, i) {
                // Spread dots in a small circle around centroid
                var angle   = (i / Math.max(parcelles.length, 1)) * 2 * Math.PI;
                var radius  = parcelles.length > 1 ? 0.05 : 0; // degrees offset
                var dotLat  = cy + radius * Math.sin(angle);
                var dotLng  = cx + radius * Math.cos(angle);

                var libre  = isLibre(p);
                var color  = libre ? '#4CAF50' : '#ef5350';
                var border = libre ? '#1b5e20' : '#b71c1c';

                var marker = L.circleMarker([dotLat, dotLng], {
                    radius:      7,
                    fillColor:   color,
                    color:       border,
                    weight:      2,
                    opacity:     1,
                    fillOpacity: 0.92,
                });

                // Tooltip on dot
                marker.bindTooltip(
                    '<b>' + (p.nom||'Parcelle') + '</b><br>' +
                    '📏 ' + (p.surface||'?') + ' m²<br>' +
                    '<span style="color:' + color + ';font-weight:700">' + (p.statut||'') + '</span>',
                    { className: 'gov-label', direction: 'top', offset: [0, -8] }
                );

                dotLayerGroup.addLayer(marker);
                dotMarkers.push(marker);
            });
        });
    }

    // ══════════════════════════════════════════════════════════
    //  LEGEND
    // ══════════════════════════════════════════════════════════
    function addLegend() {
        var legend = L.control({ position: 'bottomright' });
        legend.onAdd = function() {
            var div = L.DomUtil.create('div', 'map-legend');
            div.innerHTML =
                '<h4>Légende</h4>' +
                '<div class="legend-item"><div class="legend-sq" style="background:#c8e6c9;border:1.5px solid #4CAF50"></div>Gov. avec parcelles</div>' +
                '<div class="legend-item"><div class="legend-sq" style="background:#f1f8f1;border:1px dashed #81c784"></div>Gov. sans parcelles</div>' +
                '<div class="legend-item"><div class="legend-sq" style="background:#4CAF50;border:2px solid #1b5e20"></div>Gov. sélectionné</div>' +
                '<div style="margin-top:8px;padding-top:7px;border-top:1px solid #ddd">' +
                '<div class="legend-item"><div class="legend-dot" style="background:#4CAF50;border:2px solid #1b5e20"></div>Parcelle Libre</div>' +
                '<div class="legend-item"><div class="legend-dot" style="background:#ef5350;border:2px solid #b71c1c"></div>Parcelle Occupée</div>' +
                '</div>';
            return div;
        };
        legend.addTo(map);
    }

    // ══════════════════════════════════════════════════════════
    //  CLICK ON MAP BACKGROUND → deselect
    // ══════════════════════════════════════════════════════════
    map.on('click', function() {
        if (selectedLayer) {
            selectedLayer.setStyle(baseStyle(selectedLayer.feature));
            selectedLayer = null;
        }
        selectedGov = null;
        var govInfo = document.getElementById('gov-info');
        govInfo.className = 'empty';
        govInfo.innerHTML = 'Cliquez sur un gouvernorat';
        document.getElementById('parcelles-list').innerHTML =
            '<div class="no-parcelles"><span class="icon">🗺️</span>Sélectionnez un gouvernorat sur la carte</div>';
    });

    // ══════════════════════════════════════════════════════════
    //  BOOT
    // ══════════════════════════════════════════════════════════
    window.addEventListener('load', function() {
        setTimeout(function() {
            geojsonLayer = L.geoJSON(TUNISIA_GEOJSON, {
                style:          baseStyle,
                onEachFeature:  onEachFeature
            }).addTo(map);

            map.fitBounds(geojsonLayer.getBounds(), { padding: [15, 15] });
            addLegend();

            // Hide loading
            var loading = document.getElementById('loading');
            loading.style.opacity = '0';
            setTimeout(function() { loading.style.display = 'none'; }, 400);
        }, 150);
    });
</script>
</body>
